<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>任务数据看板 | 按微博UID统计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            padding: 20px;
            line-height: 1.4;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        .header {
            padding: 24px 28px 20px 28px;
            border-bottom: 0.5px solid #e5e5ea;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #1d1d1f;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: #6e6e73;
            margin-bottom: 16px;
        }

        .badge-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge {
            background: #f5f5f7;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            color: #1d1d1f;
        }

        /* 调整卡片宽度：全局概览更窄，个人统计自动扩展 */
        .stats-grid {
            display: grid;
            grid-template-columns: minmax(280px, 360px) 1fr;
            gap: 16px;
            margin: 20px 0;
        }

        /* 移动端适配：小屏幕下依然堆叠 */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            overflow: hidden;
        }

        .stat-header {
            padding: 16px 20px;
            font-weight: 600;
            font-size: 17px;
            letter-spacing: -0.2px;
            border-bottom: 0.5px solid #e5e5ea;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-header .toggle {
            font-size: 13px;
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-body {
            padding: 20px;
        }

        .global-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: space-between;
        }

        .stat-item {
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: #6e6e73;
        }

        .user-table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }

        .user-stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .user-stats-table th,
        .user-stats-table td {
            padding: 12px 12px;
            text-align: left;
            border-bottom: 0.5px solid #e5e5ea;
        }

        .user-stats-table th {
            background: #ffffff;
            font-weight: 600;
            color: #1d1d1f;
            font-size: 13px;
            position: sticky;
            top: 0;
        }

        .user-stats-table tr:hover td {
            background: #f9f9fb;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 20px;
            background: #ffffff;
            border-radius: 18px;
            margin: 20px 0 16px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        select {
            background: #f5f5f7;
            border: 0.5px solid #d9d9df;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 13px;
            font-family: inherit;
            color: #1d1d1f;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: #007aff;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: #f5f5f7;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            color: #1d1d1f;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: #1d1d1f;
            color: white;
        }

        .btn-primary:hover {
            background: #2c2c2e;
        }

        .btn:hover {
            background: #e5e5ea;
        }

        .detail-section {
            background: #ffffff;
            border-radius: 18px;
            margin-top: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .section-title {
            padding: 18px 20px;
            font-weight: 600;
            font-size: 17px;
            border-bottom: 0.5px solid #e5e5ea;
            background: #ffffff;
        }

        .table-wrapper {
            overflow-x: auto;
            width: 100%;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th,
        .data-table td {
            padding: 12px 12px;
            text-align: left;
            border-bottom: 0.5px solid #e5e5ea;
        }

        .data-table th {
            background: #ffffff;
            font-weight: 600;
            color: #1d1d1f;
            cursor: pointer;
            user-select: none;
        }

        .data-table th:hover {
            background: #f9f9fb;
        }

        .data-table tr:hover td {
            background: #f9f9fb;
        }

        .loading, .error {
            text-align: center;
            padding: 48px 20px;
            color: #6e6e73;
            background: #ffffff;
            border-radius: 18px;
            margin: 20px 0;
        }

        .error {
            color: #ff3b30;
        }

        .footer {
            text-align: center;
            padding: 24px 0 12px;
            font-size: 12px;
            color: #8e8e93;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.2s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.2s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #1d1d1f;
        }
        input:checked + .slider:before {
            transform: translateX(16px);
        }

        @media (max-width: 640px) {
            body { padding: 12px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .btn-group { justify-content: flex-start; }
            .global-stats { gap: 12px; }
            .stat-number { font-size: 28px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card header">
        <h1>任务数据看板 <span style="font-size: 16px;">(按微博UID统计)</span></h1>
        <div class="subtitle">个人统计 & 上报明细</div>
        <div class="badge-group">
            <span class="badge">自动同步</span>
            <span class="badge">永久存储</span>
            <span class="badge">实时刷新</span>
            <span class="badge">智能去重</span>
            <span class="badge">微博聚合</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-header">
                <span>全局概览</span>
                <div class="toggle">
                    <span style="font-size:12px;">去重模式</span>
                    <label class="switch">
                        <input type="checkbox" id="dedupToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="stat-body" id="globalStats"><div class="loading">加载中…</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-header">
                <span>个人统计 (按微博UID)</span>
                <span style="font-size:12px; font-weight:normal;" id="dedupIndicator"></span>
            </div>
            <div class="user-table-wrapper" id="userStatsTable"><div class="loading">加载中…</div></div>
        </div>
    </div>

    <div class="toolbar">
        <div class="filter-group">
            <span>任务类型</span>
            <select id="typeFilter">
                <option value="">全部</option>
                <option value="daily">日常任务</option>
                <option value="temp">临时任务</option>
            </select>
            <span id="recordCount" style="font-size: 13px; color: #6e6e73;"></span>
        </div>
        <div class="btn-group">
            <button id="downloadCsvBtn" class="btn btn-primary">下载 CSV</button>
            <button id="downloadJsonBtn" class="btn">下载 JSON</button>
            <button id="refreshBtn" class="btn">刷新</button>
        </div>
    </div>

    <div class="detail-section">
        <div class="section-title">上报明细 <span style="font-size:12px; font-weight:normal;">(原始数据，不受去重和映射影响)</span></div>
        <div class="table-wrapper" id="detailTableContainer"><div class="loading">加载中…</div></div>
    </div>

    <div class="footer">
        数据实时获取，网络稍有延迟。<br>
        去重规则：同一用户，若总解析数和白名单数相同，且记录时间差 ≤ 1小时，则只保留提交数最高的记录。<br>
    </div>
</div>

<script>
    // ---------- 配置 ----------
    const GITHUB_API = 'https://api.github.com/repos/deerinwild/task_data/contents/';
    const RAW_BASE = 'https://raw.githubusercontent.com/deerinwild/task_data/main/';
    const MAPPING_URL = RAW_BASE + 'mapping.json';
    const ONE_HOUR = 3600 * 1000;

    let dedupEnabled = false;
    let allRecords = [];
    let userMapping = {}; // 微博UID -> 豆瓣UID数组
    let reverseMapping = new Map(); // 豆瓣UID -> 微博UID (快速查找)

    let currentSortColumn = 'timestamp';
    let currentSortOrder = 'desc';
    let currentTypeFilter = '';

    // 通用 fetch
    async function githubFetch(url) {
        const res = await fetch(url, {
            headers: {
                'User-Agent': 'Mozilla/5.0 (compatible; DataViewer/1.0)',
                'Accept': 'application/vnd.github.v3+json'
            }
        });
        if (!res.ok) {
            const errText = await res.text();
            throw new Error(`${res.status} ${res.statusText}: ${errText.slice(0,200)}`);
        }
        return res;
    }

    async function fetchFileList() {
        const res = await githubFetch(GITHUB_API);
        const files = await res.json();
        return files.filter(f => f.name.startsWith('reports_') && f.name.endsWith('.json')).map(f => f.name).sort();
    }

    async function fetchJSON(filename) {
        const url = RAW_BASE + filename;
        const res = await fetch(url, { headers: { 'User-Agent': 'DataViewer/1.0' } });
        if (!res.ok) return null;
        return await res.json();
    }

    // 加载映射文件
    async function loadMapping() {
        try {
            const res = await fetch(MAPPING_URL, { headers: { 'User-Agent': 'DataViewer/1.0' } });
            if (res.ok) {
                const mapping = await res.json();
                userMapping = mapping;
                reverseMapping.clear();
                for (const [weiboUser, doubanUids] of Object.entries(userMapping)) {
                    for (const uid of doubanUids) {
                        reverseMapping.set(uid, weiboUser);
                    }
                }
                console.log('映射文件加载成功', userMapping);
            } else {
                console.warn('未找到 mapping.json，将按原始豆瓣UID显示');
                userMapping = {};
                reverseMapping.clear();
            }
        } catch (e) {
            console.warn('加载映射文件失败', e);
            userMapping = {};
            reverseMapping.clear();
        }
    }

    // 将豆瓣UID转换为微博用户名（如果没有映射则返回原UID）
    function getDisplayUser(uid) {
        return reverseMapping.get(uid) || uid;
    }

    async function loadAllData() {
        const files = await fetchFileList();
        const records = [];
        for (const file of files) {
            const data = await fetchJSON(file);
            if (data) {
                if (typeof data === 'object' && !Array.isArray(data)) records.push(data);
                else if (Array.isArray(data)) records.push(...data);
            }
        }
        return records;
    }

    // 去重函数：按原始豆瓣UID去重（因为映射后合并是在统计时进行的，去重应在映射前）
    function deduplicateRecords(records) {
        const userGroups = new Map();
        for (const r of records) {
            const uid = r.userUid;
            if (!uid) continue;
            if (!userGroups.has(uid)) userGroups.set(uid, []);
            userGroups.get(uid).push(r);
        }

        const result = [];
        for (const [uid, userRecs] of userGroups.entries()) {
            const sorted = [...userRecs].sort((a,b) => new Date(a.timestamp).getTime() - new Date(b.timestamp).getTime());
            const used = new Array(sorted.length).fill(false);
            for (let i = 0; i < sorted.length; i++) {
                if (used[i]) continue;
                const current = sorted[i];
                const total = current.totalParsed;
                const white = current.whitelistSkipped;
                const sameGroup = [i];
                for (let j = i+1; j < sorted.length; j++) {
                    if (used[j]) continue;
                    const other = sorted[j];
                    if (other.totalParsed !== total || other.whitelistSkipped !== white) continue;
                    const timeCurrent = new Date(current.timestamp).getTime();
                    const timeOther = new Date(other.timestamp).getTime();
                    if (Math.abs(timeCurrent - timeOther) <= ONE_HOUR) {
                        sameGroup.push(j);
                    }
                }
                if (sameGroup.length > 1) {
                    let bestIdx = sameGroup[0];
                    for (let idx of sameGroup) {
                        if (sorted[idx].submitted > sorted[bestIdx].submitted) bestIdx = idx;
                    }
                    result.push(sorted[bestIdx]);
                    sameGroup.forEach(idx => used[idx] = true);
                } else {
                    result.push(current);
                    used[i] = true;
                }
            }
        }
        return result;
    }

    // 统计：按微博用户聚合（传入去重后的记录）
    function computeUserStats(records) {
        const map = new Map(); // key: 显示用户名 (微博用户名或豆瓣UID)
        for (const r of records) {
            const uid = r.userUid;
            if (!uid) continue;
            const displayUser = getDisplayUser(uid);
            if (!map.has(displayUser)) {
                map.set(displayUser, {
                    displayUser: displayUser,
                    doubanUids: new Set(),
                    total: 0,
                    submitted: 0,
                    failed: 0,
                    whitelistSkipped: 0,
                    totalDuration: 0,
                    taskCount: 0,
                    dailyCount: 0,
                    tempCount: 0
                });
            }
            const s = map.get(displayUser);
            s.doubanUids.add(uid);
            const processed = (r.submitted || 0) + (r.failed || 0) + (r.whitelistSkipped || 0);
            s.total += processed;
            s.submitted += r.submitted || 0;
            s.failed += r.failed || 0;
            s.whitelistSkipped += r.whitelistSkipped || 0;
            s.totalDuration += r.durationSeconds || 0;
            s.taskCount++;
            if (r.taskType === 'daily') s.dailyCount++;
            else if (r.taskType === 'temp') s.tempCount++;
        }
        const stats = Array.from(map.values()).map(s => ({
            displayUser: s.displayUser,
            doubanUids: Array.from(s.doubanUids).join(', '),
            total: s.total,
            submitted: s.submitted,
            failed: s.failed,
            whitelistSkipped: s.whitelistSkipped,
            avgDuration: s.taskCount ? Math.round(s.totalDuration / s.taskCount) : 0,
            taskCount: s.taskCount,
            dailyCount: s.dailyCount,
            tempCount: s.tempCount
        }));
        stats.sort((a,b) => b.submitted - a.submitted);
        return stats;
    }

    function renderGlobalStats(records, userStats) {
        let autoRecords = records.filter(r => (r.durationSeconds || 0) > 0);
        if (dedupEnabled) autoRecords = deduplicateRecords(autoRecords);
        const totalTasks = autoRecords.length;
        const totalSubmitted = autoRecords.reduce((s,r) => s + (r.submitted || 0), 0);
        const totalFailed = autoRecords.reduce((s,r) => s + (r.failed || 0), 0);
        const totalWhitelist = autoRecords.reduce((s,r) => s + (r.whitelistSkipped || 0), 0);
        const html = `
            <div class="global-stats">
                <div class="stat-item"><div class="stat-number">${totalTasks}</div><div class="stat-label">上报次数</div></div>
                <div class="stat-item"><div class="stat-number">${userStats.length}</div><div class="stat-label">参与用户数(微博)</div></div>
                <div class="stat-item"><div class="stat-number">${totalSubmitted}</div><div class="stat-label">成功提交</div></div>
                <div class="stat-item"><div class="stat-number">${totalFailed}</div><div class="stat-label">失败</div></div>
                <div class="stat-item"><div class="stat-number">${totalWhitelist}</div><div class="stat-label">白名单跳过</div></div>
            </div>
        `;
        document.getElementById('globalStats').innerHTML = html;
    }

    function renderUserStatsTable(userStats) {
        if (!userStats.length) {
            document.getElementById('userStatsTable').innerHTML = '<div style="padding: 20px; text-align: center;">暂无数据</div>';
            return;
        }
        let html = `<table class="user-stats-table">
            <thead><tr>
                <th>用户(微博)</th>
                <th>关联豆瓣UID</th>
                <th>上报次数</th>
                <th>已处理总数</th>
                <th>成功</th>
                <th>失败</th>
                <th>白名单跳过</th>
                <th>平均耗时(s)</th>
                <th>日常/临时</th>
            </tr>
            </thead>
            <tbody>`;
        for (const u of userStats) {
            html += `<tr>
                <td><strong>${u.displayUser}</strong></td>
                <td><span style="font-size:11px; color:#6e6e73;">${u.doubanUids}</span></td>
                <td>${u.taskCount}</td>
                <td>${u.total}</td>
                <td style="font-weight:500;">${u.submitted}</td>
                <td>${u.failed}</td>
                <td>${u.whitelistSkipped}</td>
                <td>${u.avgDuration}</td>
                <td>${u.dailyCount}/${u.tempCount}</td>
            </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('userStatsTable').innerHTML = html;
        document.getElementById('dedupIndicator').innerHTML = dedupEnabled ? '去重已启用' : '';
    }

    // 明细表格（原始记录，不聚合，但可以显示转换后的用户名）
    function sortRecords(records, col, order) {
        return [...records].sort((a,b) => {
            let va = a[col] ?? '', vb = b[col] ?? '';
            if (col === 'totalParsed' || col === 'submitted' || col === 'failed' || col === 'whitelistSkipped' || col === 'durationSeconds') {
                va = Number(va); vb = Number(vb);
            }
            if (col === 'userUid') {
                va = getDisplayUser(va);
                vb = getDisplayUser(vb);
            }
            if (order === 'asc') return va > vb ? 1 : -1;
            else return va < vb ? 1 : -1;
        });
    }

    function renderDetailTable() {
        let filtered = allRecords;
        if (currentTypeFilter) filtered = allRecords.filter(r => r.taskType === currentTypeFilter);
        const sorted = sortRecords(filtered, currentSortColumn, currentSortOrder);
        const headers = ['用户(微博)', '任务类型', '解析总数', '提交成功', '失败', '白名单跳过', '耗时(秒)', '上报时间', '服务器接收时间'];
        const keys = ['userUid', 'taskType', 'totalParsed', 'submitted', 'failed', 'whitelistSkipped', 'durationSeconds', 'timestamp', 'received_at'];
        let html = `<table class="data-table" id="detailTable"><thead><tr>`;
        for (let i=0; i<headers.length; i++) {
            const key = keys[i];
            const isCurr = key === currentSortColumn;
            const arrow = isCurr ? (currentSortOrder === 'asc' ? ' ▲' : ' ▼') : '';
            html += `<th data-key="${key}">${headers[i]}${arrow}</th>`;
        }
        html += `</tr></thead><tbody>`;
        for (const row of sorted) {
            html += `<tr>`;
            for (const k of keys) {
                let val = row[k] ?? '';
                if (k === 'userUid') val = getDisplayUser(val);
                if (k === 'timestamp' || k === 'received_at') val = new Date(val).toLocaleString();
                html += `<td>${val}</td>`;
            }
            html += `</tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('detailTableContainer').innerHTML = html;
        document.getElementById('recordCount').innerHTML = `共 ${sorted.length} 条记录 (原始数据)`;
        document.querySelectorAll('#detailTable th').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.getAttribute('data-key');
                if (currentSortColumn === key) currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
                else { currentSortColumn = key; currentSortOrder = 'asc'; }
                renderDetailTable();
            });
        });
    }

    function exportToCSV(records) {
        const headers = ['userUid', 'taskType', 'totalParsed', 'submitted', 'failed', 'whitelistSkipped', 'durationSeconds', 'timestamp', 'received_at'];
        const rows = records.map(r => headers.map(h => r[h] ?? '').join(','));
        const csv = [headers.join(','), ...rows].join('\n');
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `task_data_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert('CSV 导出成功');
    }

    function exportToJSON(records) {
        const json = JSON.stringify(records, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `task_data_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert('JSON 导出成功');
    }

    async function refreshStats() {
        let recordsForStats = allRecords;
        if (dedupEnabled) recordsForStats = deduplicateRecords(allRecords);
        const userStats = computeUserStats(recordsForStats);
        renderGlobalStats(allRecords, userStats);
        renderUserStatsTable(userStats);
    }

    async function main() {
        const container = document.getElementById('detailTableContainer');
        container.innerHTML = '<div class="loading">加载数据…</div>';
        try {
            await loadMapping();          // 先加载映射
            allRecords = await loadAllData();
            await refreshStats();
            renderDetailTable();
        } catch (err) {
            console.error(err);
            let msg = err.message;
            if (msg.includes('403')) msg = '访问受限 (403)，可能是速率限制或网络问题，请稍后刷新。';
            document.getElementById('detailTableContainer').innerHTML = `<div class="error">加载失败: ${msg}</div>`;
            document.getElementById('globalStats').innerHTML = `<div class="error">加载失败</div>`;
            document.getElementById('userStatsTable').innerHTML = `<div class="error">加载失败</div>`;
        }
    }

    document.getElementById('refreshBtn').addEventListener('click', () => main());
    document.getElementById('downloadCsvBtn').addEventListener('click', () => {
        if (!allRecords.length) { alert('暂无数据'); return; }
        const filtered = currentTypeFilter ? allRecords.filter(r => r.taskType === currentTypeFilter) : allRecords;
        exportToCSV(filtered);
    });
    document.getElementById('downloadJsonBtn').addEventListener('click', () => {
        if (!allRecords.length) { alert('暂无数据'); return; }
        const filtered = currentTypeFilter ? allRecords.filter(r => r.taskType === currentTypeFilter) : allRecords;
        exportToJSON(filtered);
    });
    document.getElementById('typeFilter').addEventListener('change', (e) => {
        currentTypeFilter = e.target.value;
        renderDetailTable();
    });
    document.getElementById('dedupToggle').addEventListener('change', (e) => {
        dedupEnabled = e.target.checked;
        refreshStats();
    });

    main();
</script>
</body>
</html>
