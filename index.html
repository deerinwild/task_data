<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>任务数据看板 | 按微博UID统计</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif; background: #f5f5f7; color: #1d1d1f; padding: 20px; line-height: 1.45; }
    .container { max-width: 1440px; margin: 0 auto; }
    .card, .stat-card, .toolbar, .detail-section { background: #fff; border-radius: 18px; box-shadow: 0 2px 8px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.03); overflow: hidden; }
    .header { padding: 24px 28px 20px; }
    h1 { font-size: 28px; font-weight: 650; letter-spacing: -.3px; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #6e6e73; margin-bottom: 16px; }
    .badge-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .badge { background: #f5f5f7; padding: 5px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; }
    .stats-grid { display: grid; grid-template-columns: minmax(280px, 360px) 1fr; gap: 16px; margin: 20px 0; }
    .stat-header, .section-title { padding: 16px 20px; font-weight: 650; font-size: 17px; border-bottom: .5px solid #e5e5ea; background: #fff; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .stat-body { padding: 20px; }
    .global-stats { display: flex; flex-wrap: wrap; gap: 16px; justify-content: space-between; }
    .stat-item { flex: 1; min-width: 80px; text-align: center; }
    .stat-number { font-size: 30px; font-weight: 650; letter-spacing: -.5px; margin-bottom: 4px; }
    .stat-label { font-size: 13px; color: #6e6e73; }
    .user-table-wrapper { overflow-x: auto; max-height: 420px; overflow-y: auto; }
    .toolbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 20px; margin: 20px 0 16px; }
    .filter-group, .btn-group, .toggle { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 14px; }
    select { background: #f5f5f7; border: .5px solid #d9d9df; border-radius: 40px; padding: 8px 16px; font-size: 13px; font-family: inherit; color: #1d1d1f; cursor: pointer; outline: none; }
    .btn { background: #f5f5f7; border: none; border-radius: 40px; padding: 8px 18px; font-size: 13px; font-weight: 600; color: #1d1d1f; cursor: pointer; transition: .2s; }
    .btn:hover { background: #e5e5ea; }
    .btn-primary { background: #1d1d1f; color: #fff; }
    .btn-primary:hover { background: #2c2c2e; }
    .table-wrapper { overflow-x: auto; width: 100%; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 12px; text-align: left; border-bottom: .5px solid #e5e5ea; white-space: nowrap; }
    th { background: #fff; font-weight: 650; cursor: pointer; user-select: none; position: sticky; top: 0; }
    tr:hover td { background: #f9f9fb; }
    .loading, .error, .empty { text-align: center; padding: 40px 20px; color: #6e6e73; background: #fff; }
    .error { color: #ff3b30; }
    .footer { text-align: center; padding: 24px 0 12px; font-size: 12px; color: #8e8e93; }
    .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .2s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background: white; transition: .2s; border-radius: 50%; }
    input:checked + .slider { background: #1d1d1f; }
    input:checked + .slider:before { transform: translateX(16px); }
    @media (max-width: 768px) { body { padding: 12px; } .stats-grid { grid-template-columns: 1fr; } .toolbar { align-items: stretch; flex-direction: column; } }
  </style>
</head>
<body>
<div class="container">
  <div class="card header">
    <h1>任务数据看板 <span style="font-size:16px;">(按微博UID统计)</span></h1>
    <div class="subtitle">个人统计 & 上报明细</div>
    <div class="badge-group">
      <span class="badge">自动同步</span><span class="badge">永久存储</span><span class="badge">实时刷新</span><span class="badge">智能去重</span><span class="badge">微博聚合</span><span class="badge">本地任务兼容</span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-header">
        <span>全局概览</span>
        <div class="toggle">
          <span style="font-size:12px; font-weight:400;">去重模式</span>
          <label class="switch"><input type="checkbox" id="dedupToggle"><span class="slider"></span></label>
        </div>
      </div>
      <div class="stat-body" id="globalStats"><div class="loading">加载中…</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-header">
        <span>个人统计 (按微博UID)</span>
        <span style="font-size:12px; font-weight:400;" id="dedupIndicator"></span>
      </div>
      <div class="user-table-wrapper" id="userStatsTable"><div class="loading">加载中…</div></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="filter-group">
      <span>任务类型</span>
      <select id="typeFilter">
        <option value="">全部</option>
        <option value="daily">日常任务</option>
        <option value="temp">临时任务</option>
        <option value="local">本地任务</option>
      </select>
      <span id="recordCount" style="font-size:13px;color:#6e6e73;"></span>
    </div>
    <div class="btn-group">
      <button id="downloadCsvBtn" class="btn btn-primary">下载 CSV</button>
      <button id="downloadJsonBtn" class="btn">下载 JSON</button>
      <button id="refreshBtn" class="btn">刷新</button>
    </div>
  </div>

  <div class="detail-section">
    <div class="section-title">上报明细 <span style="font-size:12px;font-weight:400;">(原始数据，不受去重和映射影响)</span></div>
    <div class="table-wrapper" id="detailTableContainer"><div class="loading">加载中…</div></div>
  </div>

  <div class="footer">
    数据实时获取，网络稍有延迟。<br>
    去重规则：同一用户，若总解析数和白名单数相同，且记录时间差 ≤ 1小时，则只保留提交数最高的记录。<br>
    本地任务不参与去重，始终保留。
  </div>
</div>

<script>
const GITHUB_API = 'https://api.github.com/repos/deerinwild/task_data/contents/';
const RAW_BASE = 'https://raw.githubusercontent.com/deerinwild/task_data/main/';
const MAPPING_URL = RAW_BASE + 'mapping.json';
const ONE_HOUR = 3600 * 1000;

let dedupEnabled = false;
let allRecords = [];
let userMapping = {};
let reverseMapping = new Map();
let currentSortColumn = 'timestamp';
let currentSortOrder = 'desc';
let currentTypeFilter = '';

function normalizeTaskType(type) {
  const raw = String(type || '').trim();
  if (raw === 'manual') return 'local';
  return raw || 'unknown';
}
function taskTypeLabel(type) {
  const t = normalizeTaskType(type);
  if (t === 'daily') return '日常任务';
  if (t === 'temp') return '临时任务';
  if (t === 'local') return '本地任务';
  return t;
}
function normalizeRecord(record) {
  if (!record || typeof record !== 'object') return record;
  return { ...record, taskType: normalizeTaskType(record.taskType) };
}
function safeDateText(value) {
  if (!value) return '';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleString();
}
function getDisplayUser(uid) { return reverseMapping.get(String(uid)) || uid; }

async function githubFetch(url) {
  const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${(await res.text()).slice(0, 200)}`);
  return res;
}
async function fetchFileList() {
  const files = await (await githubFetch(GITHUB_API)).json();
  return files.filter(f => f.name.startsWith('reports_') && f.name.endsWith('.json')).map(f => f.name).sort();
}
async function fetchJSON(filename) {
  const res = await fetch(RAW_BASE + filename, { cache: 'no-cache' });
  if (!res.ok) return null;
  return await res.json();
}
async function loadMapping() {
  try {
    const res = await fetch(MAPPING_URL, { cache: 'no-cache' });
    if (!res.ok) throw new Error('mapping not found');
    userMapping = await res.json();
    reverseMapping.clear();
    for (const [weiboUser, doubanUids] of Object.entries(userMapping)) {
      for (const uid of doubanUids || []) reverseMapping.set(String(uid), weiboUser);
    }
    console.log('映射文件加载成功', userMapping);
  } catch (e) {
    console.warn('加载映射文件失败，将按原始豆瓣UID显示', e);
    userMapping = {}; reverseMapping.clear();
  }
}
async function loadAllData() {
  const files = await fetchFileList();
  const records = [];
  for (const file of files) {
    const data = await fetchJSON(file);
    if (!data) continue;
    if (Array.isArray(data)) records.push(...data.map(normalizeRecord));
    else records.push(normalizeRecord(data));
  }
  return records.filter(Boolean);
}

function deduplicateRecords(records) {
  const userGroups = new Map();
  for (const r of records) {
    const uid = String(r.userUid || '');
    if (!uid) continue;
    if (!userGroups.has(uid)) userGroups.set(uid, []);
    userGroups.get(uid).push(r);
  }
  const result = [];
  for (const userRecs of userGroups.values()) {
    const localRecs = userRecs.filter(r => normalizeTaskType(r.taskType) === 'local');
    const normalRecs = userRecs.filter(r => normalizeTaskType(r.taskType) !== 'local');
    result.push(...localRecs);
    const sorted = [...normalRecs].sort((a,b) => new Date(a.timestamp).getTime() - new Date(b.timestamp).getTime());
    const used = new Array(sorted.length).fill(false);
    for (let i = 0; i < sorted.length; i++) {
      if (used[i]) continue;
      const current = sorted[i];
      const sameGroup = [i];
      for (let j = i + 1; j < sorted.length; j++) {
        if (used[j]) continue;
        const other = sorted[j];
        if (other.totalParsed !== current.totalParsed || other.whitelistSkipped !== current.whitelistSkipped) continue;
        if (Math.abs(new Date(current.timestamp).getTime() - new Date(other.timestamp).getTime()) <= ONE_HOUR) sameGroup.push(j);
      }
      let bestIdx = sameGroup[0];
      for (const idx of sameGroup) if ((sorted[idx].submitted || 0) > (sorted[bestIdx].submitted || 0)) bestIdx = idx;
      result.push(sorted[bestIdx]);
      sameGroup.forEach(idx => used[idx] = true);
    }
  }
  return result;
}

function computeUserStats(records) {
  const map = new Map();
  for (const r of records) {
    const uid = String(r.userUid || '');
    if (!uid) continue;
    const displayUser = getDisplayUser(uid);
    if (!map.has(displayUser)) {
      map.set(displayUser, { displayUser, doubanUids: new Set(), total: 0, submitted: 0, failed: 0, whitelistSkipped: 0, totalDuration: 0, taskCount: 0, dailyCount: 0, tempCount: 0, localCount: 0 });
    }
    const s = map.get(displayUser);
    s.doubanUids.add(uid);
    s.total += (r.submitted || 0) + (r.failed || 0) + (r.whitelistSkipped || 0);
    s.submitted += r.submitted || 0;
    s.failed += r.failed || 0;
    s.whitelistSkipped += r.whitelistSkipped || 0;
    s.totalDuration += r.durationSeconds || 0;
    s.taskCount++;
    const t = normalizeTaskType(r.taskType);
    if (t === 'daily') s.dailyCount++;
    else if (t === 'temp') s.tempCount++;
    else if (t === 'local') s.localCount++;
  }
  return Array.from(map.values()).map(s => ({ ...s, doubanUids: Array.from(s.doubanUids).join(', '), avgDuration: s.taskCount ? Math.round(s.totalDuration / s.taskCount) : 0 })).sort((a,b) => b.submitted - a.submitted);
}

function renderGlobalStats(records, userStats) {
  let recordsForGlobal = dedupEnabled ? deduplicateRecords(records) : records;
  const totalTasks = recordsForGlobal.length;
  const totalSubmitted = recordsForGlobal.reduce((s,r) => s + (r.submitted || 0), 0);
  const totalFailed = recordsForGlobal.reduce((s,r) => s + (r.failed || 0), 0);
  const totalWhitelist = recordsForGlobal.reduce((s,r) => s + (r.whitelistSkipped || 0), 0);
  const localTasks = recordsForGlobal.filter(r => normalizeTaskType(r.taskType) === 'local').length;
  document.getElementById('globalStats').innerHTML = `<div class="global-stats">
    <div class="stat-item"><div class="stat-number">${totalTasks}</div><div class="stat-label">上报次数</div></div>
    <div class="stat-item"><div class="stat-number">${userStats.length}</div><div class="stat-label">参与用户数(微博)</div></div>
    <div class="stat-item"><div class="stat-number">${totalSubmitted}</div><div class="stat-label">成功提交</div></div>
    <div class="stat-item"><div class="stat-number">${totalFailed}</div><div class="stat-label">失败</div></div>
    <div class="stat-item"><div class="stat-number">${totalWhitelist}</div><div class="stat-label">白名单跳过</div></div>
    <div class="stat-item"><div class="stat-number">${localTasks}</div><div class="stat-label">本地任务</div></div>
  </div>`;
}
function renderUserStatsTable(userStats) {
  if (!userStats.length) { document.getElementById('userStatsTable').innerHTML = '<div class="empty">暂无数据</div>'; return; }
  let html = `<table><thead><tr><th>用户(微博)</th><th>关联豆瓣UID</th><th>上报次数</th><th>已处理总数</th><th>成功</th><th>失败</th><th>白名单跳过</th><th>平均耗时(s)</th><th>日常/临时/本地</th></tr></thead><tbody>`;
  for (const u of userStats) html += `<tr><td><strong>${u.displayUser}</strong></td><td><span style="font-size:11px;color:#6e6e73;">${u.doubanUids}</span></td><td>${u.taskCount}</td><td>${u.total}</td><td style="font-weight:600;">${u.submitted}</td><td>${u.failed}</td><td>${u.whitelistSkipped}</td><td>${u.avgDuration}</td><td>${u.dailyCount}/${u.tempCount}/${u.localCount}</td></tr>`;
  document.getElementById('userStatsTable').innerHTML = html + '</tbody></table>';
  document.getElementById('dedupIndicator').textContent = dedupEnabled ? '去重已启用' : '';
}
function sortRecords(records, col, order) {
  return [...records].sort((a,b) => {
    let va = a[col] ?? '', vb = b[col] ?? '';
    if (['totalParsed','submitted','failed','whitelistSkipped','durationSeconds'].includes(col)) { va = Number(va); vb = Number(vb); }
    if (col === 'userUid') { va = getDisplayUser(va); vb = getDisplayUser(vb); }
    if (col === 'taskType') { va = taskTypeLabel(va); vb = taskTypeLabel(vb); }
    return order === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
  });
}
function renderDetailTable() {
  let filtered = currentTypeFilter ? allRecords.filter(r => normalizeTaskType(r.taskType) === currentTypeFilter) : allRecords;
  const sorted = sortRecords(filtered, currentSortColumn, currentSortOrder);
  const headers = ['用户(微博)', '任务类型', '解析总数', '提交成功', '失败', '白名单跳过', '耗时(秒)', '上报时间', '服务器接收时间'];
  const keys = ['userUid', 'taskType', 'totalParsed', 'submitted', 'failed', 'whitelistSkipped', 'durationSeconds', 'timestamp', 'received_at'];
  let html = '<table id="detailTable"><thead><tr>';
  for (let i = 0; i < headers.length; i++) {
    const key = keys[i], arrow = key === currentSortColumn ? (currentSortOrder === 'asc' ? ' ▲' : ' ▼') : '';
    html += `<th data-key="${key}">${headers[i]}${arrow}</th>`;
  }
  html += '</tr></thead><tbody>';
  for (const row of sorted) {
    html += '<tr>';
    for (const k of keys) {
      let val = row[k] ?? '';
      if (k === 'userUid') val = getDisplayUser(val);
      if (k === 'taskType') val = taskTypeLabel(val);
      if (k === 'timestamp' || k === 'received_at') val = safeDateText(val);
      html += `<td>${val}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('detailTableContainer').innerHTML = html;
  document.getElementById('recordCount').textContent = `共 ${sorted.length} 条记录 (原始数据)`;
  document.querySelectorAll('#detailTable th').forEach(th => th.addEventListener('click', () => {
    const key = th.getAttribute('data-key');
    if (currentSortColumn === key) currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
    else { currentSortColumn = key; currentSortOrder = 'asc'; }
    renderDetailTable();
  }));
}
function exportToCSV(records) {
  const headers = ['userUid','taskType','totalParsed','submitted','failed','whitelistSkipped','durationSeconds','timestamp','received_at'];
  const rows = records.map(r => headers.map(h => h === 'taskType' ? taskTypeLabel(r[h]) : (r[h] ?? '')).join(','));
  const blob = new Blob(['\uFEFF' + [headers.join(','), ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `task_data_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.csv`; a.click(); URL.revokeObjectURL(a.href);
}
function exportToJSON(records) {
  const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `task_data_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`; a.click(); URL.revokeObjectURL(a.href);
}
async function refreshStats() {
  const recordsForStats = dedupEnabled ? deduplicateRecords(allRecords) : allRecords;
  const userStats = computeUserStats(recordsForStats);
  renderGlobalStats(allRecords, userStats);
  renderUserStatsTable(userStats);
}
async function main() {
  document.getElementById('detailTableContainer').innerHTML = '<div class="loading">加载数据…</div>';
  try {
    await loadMapping();
    allRecords = await loadAllData();
    await refreshStats();
    renderDetailTable();
  } catch (err) {
    console.error(err);
    const msg = String(err.message || err).includes('403') ? '访问受限 (403)，可能是速率限制或网络问题，请稍后刷新。' : String(err.message || err);
    document.getElementById('detailTableContainer').innerHTML = `<div class="error">加载失败: ${msg}</div>`;
    document.getElementById('globalStats').innerHTML = '<div class="error">加载失败</div>';
    document.getElementById('userStatsTable').innerHTML = '<div class="error">加载失败</div>';
  }
}
document.getElementById('refreshBtn').addEventListener('click', main);
document.getElementById('downloadCsvBtn').addEventListener('click', () => exportToCSV(currentTypeFilter ? allRecords.filter(r => normalizeTaskType(r.taskType) === currentTypeFilter) : allRecords));
document.getElementById('downloadJsonBtn').addEventListener('click', () => exportToJSON(currentTypeFilter ? allRecords.filter(r => normalizeTaskType(r.taskType) === currentTypeFilter) : allRecords));
document.getElementById('typeFilter').addEventListener('change', e => { currentTypeFilter = e.target.value; renderDetailTable(); });
document.getElementById('dedupToggle').addEventListener('change', e => { dedupEnabled = e.target.checked; refreshStats(); renderDetailTable(); });
main();
</script>
</body>
</html>
